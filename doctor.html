<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #fcf7f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #b35e3a;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Doctor Panel</h2>

        <input type="text" id="userPhone" placeholder="Patient Phone Number" required>

        <!-- Simple medicine input -->
        <textarea id="medicines" placeholder="Enter medicines (comma separated)
Example: Azithromycin, Paracetamol"></textarea>

        <input type="date" name="expiryDate" required />

        <button onclick="addPrescription()">Add Prescription</button>
    </div>

    <script>
        async function addPrescription() {
            const userPhone = document.getElementById("userPhone").value;
            const medicinesText = document.getElementById("medicines").value;
            const expiryDate = document.querySelector('input[name="expiryDate"]').value;

            const medicines = medicinesText.split(",").map(m => ({
                name: m.trim()
            }));

            const res = await fetch("/add-prescription", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ userPhone, medicines, expiryDate })
            });

            const data = await res.text();
            alert(data);
        }
    </script>

</body>

</html>
